name: Build Firmware
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Docker
        run: |
          chmod +x compile-with-docker.sh
          ./compile-with-docker.sh
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: f4hwn-firmware-custom
          path: archive/*.bin
